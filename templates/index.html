<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Market Trend Predictor</title>

<!-- Google Fonts + Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
  /* Reset & body */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Roboto', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 20px;
    background: linear-gradient(270deg, #1a2a6c, #b21f1f, #fdbb2d, #0f2027);
    background-size: 800% 800%;
    animation: gradientShift 30s ease infinite;
    color: #fff;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  body::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.05), transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(255,255,255,0.05), transparent 50%);
    z-index: 0;
    pointer-events: none;
  }

  /* Container */
  .cont {
    position: relative;
    z-index: 1;
    width: 95%;
    max-width: 700px;
    background: rgba(30,42,56,0.95);
    border-radius: 20px;
    padding: 40px 50px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.6);
  }

  h1 {
    text-align: center;
    font-weight: 700;
    font-size: 32px;
    margin-bottom: 30px;
    color: #fff;
    letter-spacing: 1px;
  }

  .auth-links {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 30px;
    font-size: 16px;
  }

  .auth-links p { color: #bbb; font-weight: 500; }
  .auth-links a { text-decoration: none; }

  a.btn {
    background: #2196F3;
    color: white;
    border-radius: 10px;
    padding: 10px 20px;
    font-weight: 500;
    box-shadow: 0 4px 15px rgba(33,150,243,0.6);
    transition: 0.3s;
  }

  a.btn:hover {
    background: #1976D2;
    box-shadow: 0 8px 20px rgba(25,118,210,0.5);
    transform: translateY(-2px);
  }

  /* Form container */
  .form-cont {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 25px 30px;
    box-shadow: inset 0 0 15px rgba(255,255,255,0.1);
    margin-bottom: 20px;
  }

  label {
    font-size: 16px;
    color: #ddd;
    font-weight: 500;
  }

  .cd {
    display: flex;
    gap: 15px;
    margin-top: 12px;
  }

  input[type="text"] {
    flex: 1;
    padding: 14px 16px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: 0.3s;
  }

  input[type="text"]::placeholder { color: rgba(255,255,255,0.6); }

  input[type="text"]:focus {
    border-color: #2196F3;
    box-shadow: 0 0 8px rgba(33,150,243,0.6);
    background: rgba(255,255,255,0.15);
  }

  button {
    background: #4CAF50;
    border: none;
    padding: 14px 22px;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(76,175,80,0.5);
    transition: 0.3s;
  }

  button:hover {
    background: #388E3C;
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(56,142,60,0.6);
  }

  /* Modal */
  .modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
  }

  .modal-content {
    background: rgba(30,42,56,0.95);
    padding: 25px;
    margin: 15% auto;
    width: 90%;
    max-width: 400px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.7);
    text-align: center;
    color: #fff;
  }

  .modal-content button {
    background: #F44336;
    margin-top: 15px;
    box-shadow: 0 4px 12px rgba(244,67,54,0.6);
  }

  .modal-content button:hover { background: #D32F2F; }

  @media (max-width: 768px){
    .cont { padding: 30px 20px; }
    h1 { font-size: 28px; }
  }
</style>
</head>

<body>
<div class="cont">
  <h1>Stock Market  Prediction Using Machine Learning</h1>
  
  <div class="auth-links">
    {% if session.get("username") %}
        <p>Welcome, {{ session.get("username") }}!</p>
        <a href="{{ url_for('logout') }}" class="btn">Logout</a>
    {% else %}
        <a href="{{ url_for('login') }}" class="btn">Login</a>
    {% endif %}
  </div>

  <div class="form-cont">
      <form method="POST" action="{{ url_for('index') }}">
          <label for="stock_id">Enter Stock or Mutual Fund ID (e.g., GOOG, AMZN):</label>
          <div class="cd">
              <input type="text" id="stock_id" name="stock_id" placeholder="Enter stock or fund ID">
              <button type="submit">Predict</button>
          </div>
      </form>
  </div>

  {% if error_message %}
  <div id="error-modal" class="modal">
      <div class="modal-content">
          <p>{{ error_message }}</p>
          <button onclick="closeModal()">Close</button>
      </div>
  </div>
  {% endif %}

  <script>
      window.onload = function() {
          const modal = document.getElementById("error-modal");
          if(modal) modal.style.display = "block";
      }

      function closeModal() {
          const modal = document.getElementById("error-modal");
          if(modal) modal.style.display = "none";
      }
  </script>
</div>
</body>
</html>
