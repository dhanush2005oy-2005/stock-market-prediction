<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stock Market Login & Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* Reset & Body */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #4caf50, #2196f3);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Container */
    .container {
      display: flex;
      width: 100%;
      max-width: 1000px;
      height: 90vh; /* Fill 90% of viewport height */
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
      background: #fff;
    }

    /* Panels */
    .panel {
      flex: 1;
      padding: 60px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: transform 0.6s ease-in-out;
    }

    .panel h2 {
      font-weight: 700;
      margin-bottom: 20px;
      color: #333;
    }

    /* Forms */
    form {
      display: flex;
      flex-direction: column;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      margin: 15px 0;
      padding: 15px 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 16px;
      transition: border 0.3s ease;
    }

    input:focus {
      border-color: #2196f3;
    }

    button {
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #2196f3;
      color: white;
      font-size: 18px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #1976d2;
    }

    hr {
      margin: 20px 0;
      border: none;
      border-top: 1px solid #ccc;
    }

    /* Flash messages */
    p.flash-message {
      background: rgba(255, 0, 0, 0.1);
      color: #d32f2f;
      padding: 8px;
      border-radius: 5px;
      margin: 5px 0;
      font-weight: 500;
    }

    /* How it works button */
    .how-it-works-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 8px;
      background: #ff5722;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s ease;
      width: max-content;
    }

    .how-it-works-btn:hover {
      background: #e64a19;
    }

    /* Register panel styling */
    .register-panel {
      background: linear-gradient(135deg, #ff9800, #ff5722);
      color: white;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .container {
        flex-direction: column;
        height: auto;
        max-width: 400px;
      }
      .panel {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Panel -->
    <div class="panel login-panel">
      <h2>Login</h2>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <p class="flash-message">{{ message }}</p>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form action="{{ url_for('login') }}" method="post">
        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

      <hr />

      <h3>Learn to Use the System</h3>
      <a href="{{ url_for('tutorial') }}" class="how-it-works-btn">How It Works</a>
    </div>

    <!-- Register Panel -->
    <div class="panel register-panel">
      <h2>Register</h2>
      <form action="{{ url_for('register') }}" method="post">
        <input type="text" name="new_username" placeholder="New Username" required />
        <input type="email" name="new_email" placeholder="Email" required />
        <input type="password" name="new_password" placeholder="New Password" required />
        <button type="submit">Register</button>
      </form>
    </div>
  </div>
</body>
</html>
